name: GUI smoke tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, unlabeled]
    branches:
      - main
  push:
    branches:
      - main

jobs:
  gui-smoke:
    name: Build widgets under a virtual display
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Install the GTK4 stack and Xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          python3-gi python3-gi-cairo \
          gir1.2-gtk-4.0 gir1.2-adw-1 gir1.2-gexiv2-0.10 \
          libgtk-4-1 libadwaita-1-0 \
          xvfb

    - name: Create a venv that can see the system PyGObject
      run: |
        python3 -m venv --system-site-packages .venv
        .venv/bin/pip install --upgrade pip
        # Same rawji commit as pyproject.toml (guarded by test_rawji_pin.py).
        .venv/bin/pip install "rawji @ git+https://github.com/pinpox/rawji@5549fdb93028549c2bab8abe963f1a91c50b5368"
        .venv/bin/pip install -e . --no-deps
        .venv/bin/pip install pytest pytest-xvfb \
          pytest-github-actions-annotate-failures

    - name: Run GUI tests
      env:
        GDK_BACKEND: x11
      run: .venv/bin/pytest -m gui -v
