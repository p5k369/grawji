name: Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, unlabeled]
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tests:
    name: Run Python Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: False
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:

    - uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "rawji @ git+https://github.com/pinpox/rawji.git"
        pip install -e . --no-deps
        pip install pytest pytest-cov pytest-github-actions-annotate-failures

    - name: Test with pytest
      run: python -m pytest -m "not gui" --cov --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: p5k369/rawji
