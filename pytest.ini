[pytest]
# importlib avoids "import file mismatch" when two test files share a
# basename under prepend mode and collide.
addopts = -vv --import-mode=importlib
log_cli = True
log_cli_level = DEBUG
log_cli_format = %(asctime)s.%(msecs)03d %(threadName)10s  - %(name)-50s -%(funcName)-25s:%(lineno)-4s - %(levelname)-8s - %(message)s
log_cli_date_format = %Y-%m-%d,%H:%M:%S
markers =
    requires_camera: test needs a Fuji body connected via USB; skipped otherwise.
    integration: hits the rawji library against real hardware. Not run in CI.
    slow: long-running test, skip in PR runs with -m "not slow".
